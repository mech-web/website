<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Blueprint Rectangular Solid (corrected a)</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d1b2a;
    --grid-line: rgba(255,255,255,0.04);
    --stroke: #9fe3ff;
  }

  html,body{
    height:100%;
    margin:0;
    font-family:'Fira Code', monospace;
    background:var(--bg);
    color: #dff7ff;
  }

  /* full-viewport canvas */
  canvas {
    width:100%;
    height:100vh;
    display:block;
    background:
      repeating-linear-gradient(
        0deg,
        var(--grid-line) 0px,
        var(--grid-line) 1px,
        transparent 1px,
        transparent 40px
      ),
      repeating-linear-gradient(
        90deg,
        var(--grid-line) 0px,
        var(--grid-line) 1px,
        transparent 1px,
        transparent 40px
      ),
      var(--bg);
  }

  h1 {
    position:absolute;
    top:18px;
    left:22px;
    margin:0;
    color:rgb(223, 247, 255);
    font-size:16px;
    pointer-events:none;
  }

  /* small responsive tweak so canvas fills on mobile */
  @media (max-width:600px){
    h1 { left:12px; font-size:14px; }
  }
</style>
</head>
<body>
  <canvas id="blueprint"></canvas>

<script>
(function(){

  const faceColors = {
    front:  '#dddfe1',
    back:   'rgb(13, 42, 69)',
    right:  'rgb(13, 42, 69)',
    left:   'rgb(13, 42, 69)',
    top:    'rgb(13, 42, 69)',
    bottom: 'rgb(13, 42, 69)'
  };

  const canvas = document.getElementById('blueprint');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = Math.max(600, window.innerWidth);
    canvas.height = Math.max(400, window.innerHeight);
    draw();
  }
  window.addEventListener('resize', resize);

  // projection basis
  const a = { x: 0.42, y: 0.0 };     // depth (1 unit)
  const b = { x: -0.81, y:  2.01 };  // 5-unit axis
  const c = { x: -0.81, y: -2.01 };  // 5-unit axis

  function add(u, v){ return { x: u.x + v.x, y: u.y + v.y }; }
  function add3(u, v, w){ return add(add(u,v), w); }
  function scaleVec(v, s){ return { x: v.x * s, y: v.y * s }; }

  function drawAxesGuide(scale){
    ctx.save();
    ctx.lineWidth = 0.01;
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(a.x*scale, -a.y*scale); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(b.x*scale, -b.y*scale); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(c.x*scale, -c.y*scale); ctx.stroke();
    ctx.restore();
  }

  function adjustVertexForSeam(v, faceName, seams) {
    // seams = { left: 0.05, right: 0.05, top: 0.02, bottom: 0.02 }
    // v = original vertex
    // returns new vertex adjusted for the face seams

    let offset = { x: 0, y: 0 };

    if (faceName === 'front' || faceName === 'back') {
      // extend along width (b-axis)
      if (seams.fillSeamLeft && v === leftVertex) offset = scaleVec(b, -seams.fillSeamLeft);
      if (seams.fillSeamRight && v === rightVertex) offset = scaleVec(b, seams.fillSeamRight);
      // optionally extend height
      if (seams.fillSeamTop && v === topVertex) offset = scaleVec(c, seams.fillSeamTop);
      if (seams.fillSeamBottom && v === bottomVertex) offset = scaleVec(c, -seams.fillSeamBottom);
    }

    // similarly handle 'top', 'bottom', 'left', 'right' faces if needed

    return add(v, offset);
  }


  let scale, cx, cy; // make these global within the closure

  function drawLine(p1, p2, opts = {}) {
    ctx.beginPath();
    ctx.moveTo(p1.x, -p1.y);
    ctx.lineTo(p2.x, -p2.y);
    ctx.setLineDash(opts.dashed ? [5, 6] : []);
    ctx.stroke();
  }

  function drawSmallCube(row, col, faces, faceStyles, faceEdgeStyles) {
    ctx.save();
    ctx.translate(cx, cy);

    // Base vectors
    const A = scaleVec(a, scale);        // depth vector
    const B_unit = scaleVec(b, scale / 5); // 1-unit along b
    const C_unit = scaleVec(c, scale / 5); // 1-unit along c

    // Grid offset for row/col (1-based)
    const offset = add(
      scaleVec(b, (col - 1) * (scale / 5)),
      scaleVec(c, (row - 1) * (scale / 5))
    );

    // Cube vertices relative to offset
    const V0 = offset;
    const V1 = add(offset, A);
    const V2 = add(offset, B_unit);
    const V3 = add(offset, C_unit);
    const V4 = add3(offset, A, B_unit);
    const V5 = add3(offset, A, C_unit);
    const V6 = add3(offset, B_unit, C_unit);
    const V7 = add3(offset, A, add(B_unit, C_unit));

    const cubeFaces = {
      front:  [V0,V2,V6,V3],
      back:   [V1,V4,V7,V5],
      right:  [V0,V3,V5,V1],
      left:   [V2,V6,V7,V4],
      bottom: [V3,V6,V7,V5],
      top:    [V0,V2,V4,V1]
    };

    const toDraw = faces || Object.keys(cubeFaces);

    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';

    for (let faceName of toDraw) {
      const verts = cubeFaces[faceName];
      if (!verts) continue;

      // Fill
      ctx.beginPath();
      ctx.moveTo(verts[0].x, -verts[0].y);
      for (let i = 1; i < verts.length; i++)
        ctx.lineTo(verts[i].x, -verts[i].y);
      ctx.closePath();

      if (faceStyles && faceStyles[faceName]) {
        ctx.fillStyle = faceStyles[faceName];
      } else {
        ctx.fillStyle = 'rgba(255,200,120,0.2)'; // default fill
      }
      ctx.fill();

      // Stroke per edge
      for (let i = 0; i < verts.length; i++) {
        const p1 = verts[i];
        const p2 = verts[(i + 1) % verts.length];

        let style = (faceEdgeStyles && faceEdgeStyles[faceName]) 
                      ? faceEdgeStyles[faceName][i] 
                      : null;

        if (!style || style.color === null) continue; // skip this edge

        ctx.strokeStyle = style.color;
        ctx.lineWidth = style.width || Math.max(1, scale * 0.007);
        ctx.setLineDash(style.dash || []);

        ctx.beginPath();
        ctx.moveTo(p1.x, -p1.y);
        ctx.lineTo(p2.x, -p2.y);
        ctx.stroke();
      }
      ctx.setLineDash([]);


      // Reset dash after each face
      ctx.setLineDash([]);
    }

    ctx.restore();
  }


  function createDotPattern(color = '#dddfe1', spacing = 3, radius = 1) {
    const patternCanvas = document.createElement('canvas');
    patternCanvas.width = spacing;
    patternCanvas.height = spacing;
    const pctx = patternCanvas.getContext('2d');

    pctx.fillStyle = color;
    pctx.beginPath();
    pctx.arc(spacing / 2, spacing / 2, radius, 0, Math.PI * 2);
    pctx.fill();

    return ctx.createPattern(patternCanvas, 'repeat');
  }

  function drawRectangle(startRow, startCol, width, height, faces, faceStyles, faceEdgeStyles) {
    ctx.save();
    ctx.translate(cx, cy);

    const A = scaleVec(a, scale);         // depth vector
    const B_unit = scaleVec(b, scale / 5); // width unit along b
    const C_unit = scaleVec(c, scale / 5); // height unit along c

    // Clip width/height to 5x5 grid
    const maxRow = Math.min(5, startRow + height - 1);
    const maxCol = Math.min(5, startCol + width - 1);
    const rows = maxRow - startRow + 1;
    const cols = maxCol - startCol + 1;

    // Offset in grid
    const offset = add(
      scaleVec(b, (startCol - 1) * (scale / 5)),
      scaleVec(c, (startRow - 1) * (scale / 5))
    );

    // Calculate the 8 vertices of the rectangle cuboid
    const V0 = offset; // front-bottom-left
    const V1 = add(offset, A); // back-bottom-left
    const V2 = add(offset, scaleVec(B_unit, cols)); // front-bottom-right
    const V3 = add(offset, scaleVec(C_unit, rows)); // front-top-left
    const V4 = add(V1, scaleVec(B_unit, cols)); // back-bottom-right
    const V5 = add(V1, scaleVec(C_unit, rows)); // back-top-left
    const V6 = add3(offset, scaleVec(B_unit, cols), scaleVec(C_unit, rows)); // front-top-right
    const V7 = add3(V1, scaleVec(B_unit, cols), scaleVec(C_unit, rows)); // back-top-right

    // Vertices correction — let's assign properly for cubeFaces
    const cubeFaces = {
      front:  [V0,V2,V6,V3],
      back:   [V1,V4,V7,V5],
      right:  [V0,V3,V5,V1],
      left:   [V2,V6,V7,V4],
      top: [V0,V2,V4,V1],
      bottom:    [V3,V6,V7,V5]
    };

    const toDraw = faces || Object.keys(cubeFaces);

    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';

    for (let faceName of toDraw) {
      const verts = cubeFaces[faceName];
      if (!verts) continue;

      ctx.beginPath();
      ctx.moveTo(verts[0].x, -verts[0].y);
      for (let i = 1; i < verts.length; i++)
        ctx.lineTo(verts[i].x, -verts[i].y);
      ctx.closePath();

      if (faceStyles && faceStyles[faceName]) {
        ctx.fillStyle = faceStyles[faceName];
      } else {
        ctx.fillStyle = 'rgba(255,200,120,0.2)';
      }
      ctx.fill();

      // Stroke per edge
      for (let i = 0; i < verts.length; i++) {
        const p1 = verts[i];
        const p2 = verts[(i + 1) % verts.length];

        let style = (faceEdgeStyles && faceEdgeStyles[faceName]) 
                      ? faceEdgeStyles[faceName][i] 
                      : null;

        if (!style || style.color === null) continue; // skip this edge

        ctx.strokeStyle = style.color;
        ctx.lineWidth = style.width || Math.max(1, scale * 0.007);
        ctx.setLineDash(style.dash || []);

        ctx.beginPath();
        ctx.moveTo(p1.x, -p1.y);
        ctx.lineTo(p2.x, -p2.y);
        ctx.stroke();
      }
      ctx.setLineDash([]);

    }

    ctx.restore();
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.save();

    cx = canvas.width * 0.48;
    cy = canvas.height * 0.48;
    ctx.translate(0, 0);

    const base = Math.min(canvas.width, canvas.height);
    scale = base / 6.8; // assign, not redeclare
/*
    drawAxesGuide(scale);

    const A = scaleVec(a, scale);

    const V0 = {x:0,y:0};

    const V4 = add(A, B);

    const edges = [

    }).sort((p, q) => p.midY - q.midY);

    for (let item of edgesWithDepth) {

      ctx.lineWidth = isBack ? Math.max(1, scale * 0.007) : Math.max(1, scale * 0.007);
      drawLine(p1, p2);
    }

    ctx.fillStyle = 'rgba(159,227,255,0.85)';
    ctx.beginPath();
    ctx.arc(0, 0, Math.max(2, scale * 0.007), 0, Math.PI * 2);
    ctx.fill();*/

    ctx.restore();


    // 4. Custom per-face, per-edge stroke

    //const dotPattern = createDotPattern('rgba(223, 247, 255, 1)');
    const dotPattern = '#C4C1BB';
    const linecolor = dotPattern;
    const bgcolor = '#0d1b2a';

    function drawWordWithDepth(word, startX = 0, startY = 0, letterSpacing = 6) {
      ctx.save();
      ctx.translate(startX, startY);

      // Iterate over letters in reverse to get correct z-order
      for (let i = word.length - 1; i >= 0; i--) {
        const letter = word[i].toUpperCase();
        ctx.save();

        // Draw letter at current origin
        if (letter === 'M') drawM();
        else if (letter === 'E') drawE();
        else if (letter === 'C') drawC();
        else if (letter === 'H') drawH();

        ctx.restore();

        // Move left for next letter
        ctx.translate(-letterSpacing, 0);
      }

      ctx.restore();
    }


    drawWordWithDepth("MECH", 1100, 0, scale * 2);

    function drawH() {
      // H
      drawRectangle(1, 5, 1, 5, ["front","top","right"],       
        { front: dotPattern, right: bgcolor, top: bgcolor },
        {

          ]

      drawRectangle(3, 4, 1, 1, ["front","top","right"],

            { color: null, width: 1, dash: [] }
          ]
        }
      );    

      drawRectangle(1, 2, 1, 5, ["front","top","right"],       
        { front: dotPattern, right: bgcolor, top: bgcolor },
        {
          front: [
            { color: linecolor, width: 1, dash: [] },

          ],
          right: [

          ],
          top: [
            { color: linecolor, width: 1, dash: [] },
            { color: linecolor, width: 1, dash: [] },
            { color: linecolor, width: 1, dash: [] },
            { color: null, width: 1, dash: [] }
          ]
        }
      );
    }

    function drawC() {
      drawRectangle(1, 5, 1, 5, ["front","top","right"],       
        { front: dotPattern, right: bgcolor, top: bgcolor },
        {
          front: [
            { color: linecolor, width: 1, dash: [] },

      drawRectangle(5, 2, 3, 1, ["front","top","right"],

          ],
          right: [

          ],
          top: [
            { color: linecolor, width: 1, dash: [] },

            { color: linecolor, width: 1, dash: [] }
          ]
        }
      );

      drawRectangle(1, 2, 2, 1, ["front","top","right"],       
        { front: dotPattern, right: bgcolor, top: bgcolor },
        {
          front: [
            { color: linecolor, width: 1, dash: [] },
            { color: linecolor, width: 1, dash: [] },
            { color: linecolor, width: 1, dash: [] },
            { color: linecolor, width: 1, dash: [] }
          ],
          right: [

          ],
          top: [

            { color: linecolor, width: 1, dash: [] },
            { color: linecolor, width: 1, dash: [] },
            { color: linecolor, width: 1, dash: [] }
          ]
        }
      );

      drawRectangle(4, 2, 1, 2, ["front","top","right"],       
        { front: dotPattern, right: bgcolor, top: bgcolor },
        {
          front: [
            { color: linecolor, width: 1, dash: [] },
            { color: linecolor, width: 1, dash: [] },

          ],

          ]
        }

      drawRectangle(1, 2, 1, 2, ["front","top","right"],

          front: [
